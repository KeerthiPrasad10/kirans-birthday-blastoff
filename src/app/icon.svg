<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="sg" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="30%" stop-color="#ffeb3b"/>
      <stop offset="70%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffeb3b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffeb3b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <!-- Rays -->
  <g stroke="#ff9800" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="32" y1="2" x2="32" y2="10"/>
    <line x1="32" y1="54" x2="32" y2="62"/>
    <line x1="2" y1="32" x2="10" y2="32"/>
    <line x1="54" y1="32" x2="62" y2="32"/>
    <line x1="10.8" y1="10.8" x2="16.4" y2="16.4"/>
    <line x1="47.6" y1="47.6" x2="53.2" y2="53.2"/>
    <line x1="53.2" y1="10.8" x2="47.6" y2="16.4"/>
    <line x1="16.4" y1="47.6" x2="10.8" y2="53.2"/>
  </g>
  <!-- Sun body -->
  <circle cx="32" cy="32" r="16" fill="url(#sg)"/>
  <!-- Highlight -->
  <circle cx="28" cy="28" r="6" fill="rgba(255,255,255,0.3)"/>
