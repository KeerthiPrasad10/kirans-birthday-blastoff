<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030510"/>
      <stop offset="50%" stop-color="#0a0e2a"/>
      <stop offset="100%" stop-color="#050714"/>
    </linearGradient>
    <radialGradient id="sun" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="30%" stop-color="#ffeb3b"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="white" opacity="0.8"/>
  <circle cx="300" cy="150" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="500" cy="60" r="2" fill="white" opacity="0.7"/>
  <circle cx="700" cy="120" r="1" fill="white" opacity="0.5"/>
  <circle cx="900" cy="80" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="1100" cy="150" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="500" r="2" fill="white" opacity="0.7"/>
  <circle cx="800" cy="550" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1050" cy="450" r="2" fill="white" opacity="0.8"/>
  <circle cx="150" cy="350" r="1" fill="white" opacity="0.6"/>
  <!-- Planet -->
  <circle cx="950" cy="400" r="60" fill="#d4a44c" opacity="0.6"/>
  <ellipse cx="950" cy="400" rx="95" ry="18" stroke="#ecd9a0" stroke-width="4" fill="none" opacity="0.4"/>
  <!-- Rocket -->
  <g transform="translate(600, 280) rotate(-30)">
