    <path d="M0,-50 C10,-35 12,-25 12,-18 L-12,-18 C-12,-25 -10,-35 0,-50Z" fill="#e53935"/>
    <circle cx="0" cy="-4" r="8" fill="#4fc3f7" stroke="#0288d1" stroke-width="1.5"/>
    <path d="M-15,25 L-30,45 L-15,35Z" fill="#e53935"/>
    <path d="M15,25 L30,45 L15,35Z" fill="#e53935"/>
    <path d="M-10,35 L0,65 L10,35Z" fill="#ff9800"/>
    <path d="M-5,35 L0,55 L5,35Z" fill="#ffeb3b"/>
  </g>
  <!-- Title -->
  <text x="600" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="52" fill="white">Kiran's Birthday Party!</text>
  <text x="600" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#a5b4fc">May 10, 2026 · 3:00–5:30 PM · Haarlem</text>
